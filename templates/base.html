<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rabbithole Music{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            green: { 500: '#1db954', 600: '#1aa34a', 400: '#1ed760' },
            dark: { 900: '#121212', 800: '#181818', 700: '#282828', 600: '#3e3e3e' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #121212; color: #fff; font-family: 'Circular', 'Helvetica Neue', Arial, sans-serif; }
    .card { background: #181818; border-radius: 8px; transition: background 0.2s; }
    .card:hover { background: #282828; }
    .btn-green { background: #1db954; color: #000; font-weight: 700; border-radius: 500px; padding: 12px 32px; transition: all 0.2s; }
    .btn-green:hover { background: #1ed760; transform: scale(1.04); }
    .btn-outline { border: 1px solid #727272; color: #fff; border-radius: 500px; padding: 12px 32px; font-weight: 700; transition: all 0.2s; }
    .btn-outline:hover { border-color: #fff; }
    ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #121212; } ::-webkit-scrollbar-thumb { background: #535353; border-radius: 4px; }

    /* Ko-fi button */
    .btn-kofi {
      display: inline-flex; align-items: center; gap: 6px;
      background: #FF5E5B; color: #fff; font-weight: 700; font-size: 0.75rem;
      border-radius: 500px; padding: 6px 14px; transition: all 0.2s;
      white-space: nowrap; text-decoration: none;
    }
    .btn-kofi:hover { background: #ff7370; transform: scale(1.04); }
    .btn-kofi svg { flex-shrink: 0; }
  </style>
  <!-- CSRF token — read by the fetch interceptor below -->
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
  {% block head %}{% endblock %}
</head>
<body class="h-full min-h-screen">
  <nav class="flex items-center justify-between px-8 py-4 border-b border-dark-700 sticky top-0 z-50" style="background:#121212ee; backdrop-filter:blur(10px);">
    <a href="/" class="flex items-center gap-2 text-white font-bold text-xl">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Rabbithole" class="h-9 w-auto"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
      <svg viewBox="0 0 24 24" class="w-8 h-8 fill-green-500" style="display:none"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Rabbithole
    </a>
    <div class="flex items-center gap-4">
      <a href="/community" class="text-gray-400 hover:text-white transition text-sm font-semibold">Community</a>
      {% if session.user_id %}
      <a href="/history" class="text-gray-400 hover:text-white transition text-sm font-semibold">History</a>
      {% endif %}
      <!-- Ko-fi -->
      <a href="https://ko-fi.com/W7W31NLZ7P/tip" target="_blank" rel="noopener" class="btn-kofi" title="Keep the developer caffeinated ☕">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M5.5 2C4.1 2 3 3.1 3 4.5v13C3 18.9 4.1 20 5.5 20h9c1.4 0 2.5-1.1 2.5-2.5v-1h1c1.9 0 3.5-1.6 3.5-3.5S19.9 9 18 9h-1V4.5C17 3.1 15.9 2 14.5 2h-9zM17 11h1c.8 0 1.5.7 1.5 1.5S18.8 14 18 14h-1v-3z"/>
        </svg>
        Keep me caffeinated ☕
      </a>
      {% if session.user_id %}
        <div class="flex items-center gap-3">
          {% if session.avatar_url %}
            <img src="{{ session.avatar_url }}" class="w-8 h-8 rounded-full">
          {% endif %}
          <span class="text-sm text-gray-300">{{ session.display_name }}</span>
          <a href="/auth/logout" class="btn-outline text-sm py-2 px-4">Log out</a>
        </div>
      {% else %}
        <a href="/auth/login" class="btn-green text-sm py-2 px-6">Connect Spotify</a>
      {% endif %}
    </div>
  </nav>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Global fetch interceptor — automatically attaches the CSRF token to every
    // non-GET request so individual templates don't have to think about it.
    (function () {
      var _csrfToken = document.querySelector('meta[name="csrf-token"]').content;
      var _origFetch = window.fetch;
      window.fetch = function (url, options) {
        options = options || {};
        var method = (options.method || 'GET').toUpperCase();
        if (method !== 'GET' && method !== 'HEAD' && method !== 'OPTIONS') {
          var headers = options.headers || {};
          if (!(headers instanceof Headers)) {
            headers['X-CSRFToken'] = _csrfToken;
          } else {
            headers.set('X-CSRFToken', _csrfToken);
          }
          options.headers = headers;
        }
        return _origFetch(url, options);
      };
    })();
  </script>
</body>
</html>
