name: Keep Alive

on:
  schedule:
    # Every 10 minutes — keeps Render free tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # allow manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Rabbithole Music
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://rabbitholemusic.nerdydeals.net/health)
          echo "Response: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Warning: site returned $STATUS"
            exit 1
          fi
